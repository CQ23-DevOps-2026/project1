spring:
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://identity/realms/Yas
        registration:
          api-client:
            provider: keycloak
            client-id: storefront-bff
            client-secret: ZrU9I0q2uXBglBnmvyJdkl1lf0ncr8tn #gitleaks:allow
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email, roles
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - SaveSession
          routes:
            # Changes for your local development should not be committed
            - id: api_servicename_local
              uri: http://localhost:8081
              predicates:
                - Path=/api/servicename/**
              filters:
                - TokenRelay=
                - StripPrefix=1
            - id: api
              uri: http://api.yas.local
              predicates:
                - Path=/api/**
              filters:
                - TokenRelay=
                - StripPrefix=1
            - id: nextjs
              uri: http://localhost:3000
              predicates:
                - Path=/**
